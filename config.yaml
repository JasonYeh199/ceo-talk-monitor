sources:
  youtube:
    enabled: true
    search_limit_per_query: 5
    channel_recent_limit: 20
    max_items_per_company: 10
    cnbc_channel_url: https://www.youtube.com/@CNBCTelevision
    query_templates:
      - "{company} {executive} CNBC interview"
      - "{ticker} {executive} CNBC"
      - "{company} CEO CNBC interview"
      - "{company} earnings reaction CNBC interview"
  podcasts:
    enabled: true
    max_entries_per_feed: 30
    feeds:
      - name: CNBC Squawk Box
        url: https://podcasts.apple.com/us/podcast/feed/id1480890290
      - name: CNBC Closing Bell
        url: https://podcasts.apple.com/us/podcast/feed/id1612281974
      - name: Decoder with Nilay Patel
        url: https://feeds.megaphone.fm/recodedecode
      - name: Acquired
        url: https://feeds.transistor.fm/acquired
      - name: Invest Like the Best
        url: https://feeds.simplecast.com/PJDRWW6t
      - name: Bloomberg Technology
        url: https://podcasts.apple.com/us/podcast/feed/id1611767434

relevance:
  threshold: 7.0
  include_terms:
    - interview
    - speaks
    - joins
    - conversation
    - fireside chat
    - keynote
    - earnings
    - guidance
    - conference
  exclude_terms:
    - stock alert
    - price target
    - technical analysis
    - chart
    - analyst says
    - shares move

transcription:
  provider: faster_whisper
  model_size: small
  device: cpu
  compute_type: int8
  language: en
  diarization:
    enabled: false

summarization:
  provider: heuristic
  model: gpt-4.1-mini
  max_transcript_chars: 20000
  output_language: zh-TW

vector_store:
  provider: qdrant
  collection_name: ceo_talk_transcripts
  embedding_model: sentence-transformers/all-MiniLM-L6-v2

storage:
  audio_dir: data/audio
  transcript_dir: data/transcripts
